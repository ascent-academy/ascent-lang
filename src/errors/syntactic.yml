# S — syntactic: each word is fine on its own, but they don't fit together

- code: S0001
  name: unclosed-paren
  category: syntactic
  summary: "An opening '(' has no matching ')'."
  message: "I expected a ')' here."
  explanation: >-
    Every '(' has to be closed with a matching ')'. One was opened earlier —
    around a group like '(a + b)', a call's inputs, or an 'if' or 'while'
    condition — and this is where its ')' should be.
  related:
    - key: opener
      label: "this '(' was opened here"

- code: S0002
  name: unclosed-brace
  category: syntactic
  summary: "An opening '{' has no matching '}'."
  message: "I expected a '}' here."
  explanation: >-
    A block groups statements between '{' and '}'. One was opened earlier and
    this is where its closing '}' should be.
  related:
    - key: opener
      label: "this '{' was opened here"

- code: S0003
  name: unclosed-bracket
  category: syntactic
  summary: "An opening '[' has no matching ']'."
  message: "I expected a ']' here."
  explanation: >-
    Square brackets '[ ]' wrap a list like '[1, 2, 3]' or pick an item out of
    one like 'items[0]'. One '[' was opened earlier and this is where its ']'
    should be.
  related:
    - key: opener
      label: "this '[' was opened here"

- code: S0004
  name: expected-expression
  category: syntactic
  summary: A value was expected here, but there wasn't one.
  message: "I expected a value here."
  explanation: >-
    This spot needs a value — a number, a String, a name, or something built
    from them like 'a + b'. Places that need one include just after '=', just
    after an operator like '+', and inside '( )'.

- code: S0005
  name: chained-comparison
  category: syntactic
  summary: "Comparisons can't be chained — 'a < b < c' isn't allowed."
  message: "I can't chain two comparisons like this."
  explanation: >-
    A comparison such as '<' or '==' looks at two values and gives back True or
    False. Chaining a third one, as in 'a < b < c', would then compare that
    True or False against another value, which has no clear meaning — so
    compare two values at a time.

- code: S0006
  name: expected-semicolon
  category: syntactic
  summary: "A ';' was expected to end the statement."
  message: "I expected a ';' here."
  explanation: >-
    Every statement in Ascent ends with a ';'. It looks like the statement
    before this point was never finished with one.

- code: S0007
  name: expected-slot-name
  category: syntactic
  summary: "A name was expected after 'fix' or 'mut', as a program input, or as a function parameter."
  message: "I expected a name here."
  explanation: >-
    A name is needed here — after 'fix' or 'mut' to create one
    ('fix count = 0'), as the name of a program input
    ('program (age: Int) { … }'), or as a function parameter
    ('fn(x: Int): Int { … }'). A name starts with a lowercase letter.

- code: S0008
  name: expected-equals
  category: syntactic
  summary: "An '=' was expected after the name in a 'fix' or 'mut' declaration."
  message: "I expected an '=' here."
  explanation: >-
    'fix' and 'mut' give a name its starting value, so the name is followed by
    '=' and the value, like 'fix count = 0'. (A type can go in between, as in
    'fix count: Int = 0'.)

- code: S0009
  name: expected-block
  category: syntactic
  summary: "A block ('{ … }') was expected here."
  message: "I expected a '{' here."
  explanation: >-
    The body of an 'if', 'else', 'while', or 'program' is always a block between
    '{' and '}', even when it holds a single line, as in 'if (ok) { … }' or
    'program (age: Int) { … }'.

- code: S0010
  name: expected-test-paren
  category: syntactic
  summary: "A '(' was expected to open a condition, a 'program' input list, or a function's parameters."
  message: "I expected a '(' here."
  explanation: >-
    An 'if' or 'while' condition, the inputs listed after 'program', and a
    function's parameters all go inside '( )' — like 'if (age >= 18) { … }',
    'program (age: Int) { … }', or 'fn(x: Int): Int { … }'. This is where that
    opening '(' should be.

- code: S0011
  name: expected-colon
  category: syntactic
  summary: "A ':' was expected between a program input's or function parameter's name and its type."
  message: "I expected a ':' here."
  explanation: >-
    A program input and a function parameter are each written as a name, then
    ':', then its type — like 'program (age: Int) { … }' or
    'fn(x: Int): Int { … }'. This is where the ':' should be.

- code: S0012
  name: expected-type
  category: syntactic
  summary: A type name was expected here.
  message: "I expected a type name here."
  explanation: >-
    A type name says what kind of value this is. The built-in types are Int,
    Float, Bool, and String, plus 'List<…>' for a list, as in 'List<Int>'.

- code: S0013
  name: expected-method-name
  category: syntactic
  summary: "A method name was expected after '.'."
  message: "I expected a method name here."
  explanation: >-
    A '.' calls a method on a value, so it's followed by the method's name and
    '( )', like 'items.length()'. A method name starts with a lowercase letter.

- code: S0014
  name: extra-interpolation-content
  category: syntactic
  summary: "A '${ }' hole in a String holds more than one value."
  message: "I expected this '${ }' hole to end here."
  explanation: >-
    A '${ }' hole inside a String holds exactly one value, like '${name}' or
    '${price.toString()}'. This one has extra content after a complete value, so
    it isn't clear what to do with it.

- code: S0015
  name: expected-loop-name
  category: syntactic
  summary: "A loop variable name was expected after 'for'."
  message: "I expected a name or a pattern here."
  explanation: >-
    A 'for' loop names each item as it goes, like 'for item in items' or
    'for i in 0..n'. The name comes right after 'for', and it starts with a
    lowercase letter. It can also destructure each item into its fields with a
    pattern, like 'for Point{ x, y } in points'.

- code: S0016
  name: expected-in
  category: syntactic
  summary: "'in' was expected after the loop variable in a 'for' loop."
  message: "I expected 'in' here."
  explanation: >-
    A 'for' loop is written 'for name in values', so 'in' comes after the loop
    variable and before what's being looped over, as in 'for i in 0..n'.

- code: S0017
  name: expected-type-name
  category: syntactic
  summary: "A type name was expected after 'type'."
  message: "I expected a type name here."
  explanation: >-
    A 'type' declaration gives a new type its name, like 'type Person = { … }'.
    The name comes right after 'type', and it starts with an uppercase letter.

- code: S0018
  name: expected-type-equals
  category: syntactic
  summary: "An '=' was expected after the name in a 'type' declaration."
  message: "I expected an '=' here."
  explanation: >-
    A 'type' declaration is written 'type Name = { … }', so '=' comes after the
    name and before the fields, as in 'type Person = { name: String }'.

- code: S0019
  name: expected-record-brace
  category: syntactic
  summary: "A '{' was expected to open a record's fields."
  message: "I expected a '{' here."
  explanation: >-
    A record type lists its fields between '{' and '}', like
    'type Person = { name: String, age: Int }'. This is where that opening '{'
    should be.

- code: S0020
  name: expected-field-name
  category: syntactic
  summary: A field name was expected here.
  message: "I expected a field name here."
  explanation: >-
    A record's fields are each written as a name, like the 'name' and 'age' in
    'Person{ name: \"Ann\", age: 30 }'. A field name starts with a lowercase
    letter.

- code: S0021
  name: expected-field-colon
  category: syntactic
  summary: "A ':' was expected after a field name."
  message: "I expected a ':' here."
  explanation: >-
    Each field is written as a name, then ':', then its type or value — like
    'name: String' when declaring a type, or 'name: \"Ann\"' when building one.
    This is where the ':' should be.

- code: S0022
  name: expected-variant
  category: syntactic
  summary: A variant name was expected in a 'type' declaration.
  message: "I expected a variant name here."
  explanation: >-
    After the '=' of a 'type', each case is a variant — a name that starts with
    an uppercase letter, followed by its fields in braces, like the 'Circle' in
    'type Shape = Circle{ radius: Float } | Square{ side: Float }'. Variants are
    separated by '|'. This is where a variant name should be.

- code: S0023
  name: empty-braces
  category: syntactic
  summary: "Empty braces '{}' were written where a name with no fields belongs."
  message: "Empty braces '{}' aren't allowed here."
  explanation: >-
    A variant with no fields is written as just its name, like 'Red' in
    'type Light = Red | Green', and it's built the same way — 'fix c = Red'.
    Empty braces would be a second spelling for that same no-fields case, so
    they're not allowed. Drop the '{}', or add the fields it should hold.

- code: S0024
  name: expected-return-type
  category: syntactic
  summary: "A function's parameters weren't followed by ':' and a return type."
  message: "I expected ':' and a return type here."
  explanation: >-
    A function states its return type right after its parameters, like
    'fn(x: Int): Int { … }' — a ':' and then the type the function gives back,
    the same ':' its parameters use. Every function says what it returns; one
    that returns nothing returns 'Done'. Add ': Type' after the ')'.

- code: S0025
  name: expected-fn-type-arrow
  category: syntactic
  summary: "A function type's parameter list wasn't followed by '->' and a result type."
  message: "I expected '->' and a result type here."
  explanation: >-
    A function *type* is written with its parameter types in '( )', then '->',
    then the type it produces — like 'Fn(Int) -> String'. (A function *value*
    instead uses a ':' before its return type: 'fn(x: Int): String { … }'.) This
    is where the '->' should be.

- code: S0026
  name: expected-fn-body
  category: syntactic
  summary: "A function's return type wasn't followed by a body."
  message: "I expected a '{' or '=>' here."
  explanation: >-
    A function's body comes right after its return type, in one of two shapes: a
    '{ … }' block when it runs several statements ('fn(x: Int): Int { fix y = x +
    1; y * 2 }'), or '=> ' and a single expression for the short case
    ('fn(x: Int): Int => x + 1'). This is where that '{' or '=>' should be.

- code: S0027
  name: redundant-arrow-block
  category: syntactic
  summary: "A '=>' function body was followed by a '{ … }' block."
  message: "A '=>' body is a single expression, not a block."
  explanation: >-
    The '=>' body form is for one expression, written straight after the arrow —
    'fn(x: Int): Int => x + 1'. A '{ … }' block is the other form and stands on
    its own, with no arrow — 'fn(x: Int): Int { … }'. Writing '=> { … }' asks for
    both at once. Drop the '=>' to keep the block, or drop the braces to keep the
    single expression.

- code: S0028
  name: empty-program-inputs
  category: syntactic
  summary: "A 'program (…)' was written with no inputs between its '( )'."
  message: "A 'program' needs at least one input here."
  explanation: >-
    The 'program (…) { … }' form is for a program that takes named inputs, so it
    lists at least one, like 'program (age: Int) { … }'. A program that takes no
    inputs doesn't use 'program' at all — it's just a sequence of statements on
    their own. Add an input like 'name: Type', or drop the 'program (…) { … }'
    wrapper and leave the statements bare.

- code: S0029
  name: empty-program-body
  category: syntactic
  summary: "A 'program' block has no statements."
  message: "A 'program' block needs at least one statement."
  explanation: >-
    The 'program (…) { … }' block is where a program does its work, so it needs
    at least one statement between its braces. An empty '{ }' runs nothing and
    uses none of the inputs it declares. Add the statements the program should
    run.

- code: S0030
  name: content-after-program
  category: syntactic
  summary: "Something was written after the 'program' block."
  message: "I expected the file to end after the 'program' block."
  explanation: >-
    A 'program (…) { … }' block is the whole program, so nothing comes after its
    closing '}'. Everything the program does goes inside the braces.

- code: S0031
  name: expected-update-field
  category: syntactic
  summary: "A field name or an '[index]' was expected in a 'with' update."
  message: "I expected a field name or an '[index]' here."
  explanation: >-
    A 'with' update names the place to change, then '=', then its new value — a
    field name for a record ('user with name = \"new\"'), or an '[index]' in
    brackets for a list ('xs with [0] = 9'). Several changes go in braces:
    'user with { name = \"new\", age = 31 }'. This is where that field name or
    '[index]' should be.

- code: S0032
  name: expected-update-equals
  category: syntactic
  summary: "An '=' was expected after a field name in a 'with' update."
  message: "I expected an '=' here."
  explanation: >-
    A 'with' update assigns a field's new value with '=', like
    'user with name = \"new\"'. (Building a value instead uses ':', like
    'User{ name: \"new\" }' — '=' changes a copy, ':' builds.) This is where
    the '=' should be.

- code: S0033
  name: empty-update-braces
  category: syntactic
  summary: "A 'with' update was written with empty braces '{ }'."
  message: "A 'with' update needs at least one field."
  explanation: >-
    A 'with' update changes one or more fields of a record, like
    'user with { name = \"new\", age = 31 }'. Empty braces '{ }' change nothing,
    so there is no update to make. Name at least one field to change, or drop the
    'with' entirely.

- code: S0034
  name: expected-match-brace
  category: syntactic
  summary: "A '{' was expected to open a 'match'’s arms."
  message: "I expected a '{' here."
  explanation: >-
    A 'match' lists its arms between '{' and '}', each written as a pattern,
    then '->', then a result — like 'match n { 0 -> "none", else -> "some" }'.
    This is where that opening '{' should be.

- code: S0035
  name: expected-pattern
  category: syntactic
  summary: A pattern was expected at the start of a 'match' arm.
  message: "I expected a pattern here."
  explanation: >-
    Each arm of a 'match' starts with a pattern — a plain value to compare
    against, like '0', '"hi"', or 'True'; a variant like 'Circle{ radius }';
    'None' or a name like 'value' for the two cases of an optional; or the word
    'else' for the catch-all arm. This is where that pattern should be.

- code: S0036
  name: expected-arrow
  category: syntactic
  summary: "A '->' was expected after a 'match' arm's pattern."
  message: "I expected a '->' here."
  explanation: >-
    Each arm of a 'match' is written as a pattern, then '->', then the result to
    use when it matches — like '0 -> "none"'. This is where the '->' should be.

- code: S0037
  name: async-without-fn
  category: syntactic
  summary: "'async' is not followed by 'fn'."
  message: "'async' must be followed by 'fn'."
  explanation: >-
    'async' marks a function as asynchronous, so it comes right before 'fn', like
    'async fn(id: Int): User { … }'. There is nothing else it can attach to.

- code: S0038
  name: async-call-missing-args
  category: syntactic
  summary: "An async-call mark '!' is not followed by an argument list."
  message: "The '!' async-call mark must be followed by '(…)'."
  explanation: >-
    '!' prepares a task by calling an async function, like 'fetchUser!(id)', so it
    needs an argument list '(…)' right after it. (Inequality is written '!=', and
    negation is the word 'not' — a bare '!' is only the async-call mark.)

- code: S0039
  name: import-expected-clause
  category: syntactic
  summary: "'import' is not followed by '{ names }' or a module name."
  message: "After 'import' I expected either '{ … }' or a name."
  explanation: >-
    An import comes in two shapes: 'import { min, max } from "math";' brings
    specific names in to use bare, and 'import math from "math";' brings the whole
    module in, used as 'math.min(…)'. So right after 'import' there is either a
    '{' or a module name.

- code: S0040
  name: import-expected-from
  category: syntactic
  summary: "An import's names are not followed by 'from'."
  message: "I expected 'from' here."
  explanation: >-
    An import names what to bring in, then 'from', then which module — like
    'import { min } from "math";'. The 'from' and the module name were missing
    after the names.

- code: S0041
  name: import-expected-module
  category: syntactic
  summary: "'from' is not followed by a plain quoted module name."
  message: "I expected a module name in double quotes here."
  explanation: >-
    After 'from' comes the module to import from, written in double quotes, like
    'from "math"'. In this release the module name is a fixed word (a built-in
    library such as "math" or "assert") with no '${…}' inside it.

- code: S0042
  name: import-inside-body
  category: syntactic
  summary: An import appears inside a block or body instead of at the top of the file.
  message: "An import can't go inside a block — it belongs at the top of the file."
  explanation: >-
    An import brings names in for the whole file, so it lives at the top level,
    never scoped inside a function, a loop, an 'if', or a 'program' body. Move
    this import up to the start of the file, above everything else.

- code: S0043
  name: import-not-leading
  category: syntactic
  summary: An import appears after other code instead of at the very top of the file.
  message: "Imports have to come first, before any other statement."
  explanation: >-
    All of a file's imports go together at the very top, above the rest of the
    code (and above 'program'). This import comes after another statement — move
    it up so every import sits at the start of the file.

- code: S0044
  name: block-as-value
  category: syntactic
  summary: "A block ('{ … }') was written where a value belongs."
  message: "A '{ … }' block can't be used as a value here."
  explanation: >-
    A '{ … }' block groups statements as the body of something — an 'if', a
    'while' or 'for' loop, a function ('fn(…): T { … }'), or a 'match' arm. It is
    not a value on its own, so it can't be given a name, passed to a function, or
    placed inside a larger expression. A '{' here has no body to belong to. To
    pick a value, use an 'if' ('fix x = if (c) { 1 } else { 2 }') or a 'match';
    to run several statements, put them in the body of the construct they belong
    to.
