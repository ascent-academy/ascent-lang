# R — runtime: only running reveals it (division by zero, overflow, index out of bounds)

- code: R0001
  name: int-overflow
  category: runtime
  summary: An Int calculation produced a result outside Int's 64-bit range.
  message: "'{found}' overflows Int."
  explanation: >-
    Int holds a whole number in 64 bits, from -9223372036854775808 to
    9223372036854775807. This calculation's result falls outside that range, so
    Ascent stops rather than silently wrapping it around to a different
    number. If the calculation genuinely needs to go this high, use Float
    instead.

- code: R0002
  name: division-by-zero
  category: runtime
  summary: The right-hand side of '/', 'div', or 'mod' was zero.
  message: "'{found}' is zero, so I can't divide by it."
  explanation: >-
    '/', 'div', and 'mod' all need a divisor that isn't zero — there's no
    number that answers "divided by zero". Check that '{found}' can't actually
    be zero here, or guard this line with an 'if'.

- code: R0003
  name: negative-int-exponent
  category: runtime
  summary: Int ** Int was raised to a negative power, which needs a fractional result.
  message: "I can't raise an Int to the negative power '{found}'."
  explanation: >-
    When both sides of '**' are Int, the result is always an Int — but a
    negative exponent needs a fractional answer, like 0.5, which an Int can't
    hold. Make the base a Float instead (for example '2.0 ** {found}') to get
    a Float result.

- code: R0004
  name: non-finite-float
  category: runtime
  summary: A Float calculation produced Infinity or NaN, which aren't valid Float values.
  message: "'{found}' doesn't produce a real number."
  explanation: >-
    Every Float in Ascent has to be a real, ordered number — Ascent never lets
    'Infinity' or 'NaN' exist as a value. This calculation's result is either
    too large to represent or has no defined numeric answer, so it can't
    become a Float.

- code: R0005
  name: index-out-of-bounds
  category: runtime
  summary: A list was indexed with '[ ]' outside its valid range.
  message: "'{found}' is out of range for this list."
  explanation: >-
    A list index counts from 0, so a list with {length} item(s) has valid
    indexes from 0 up to (but not including) {length}. '{found}' falls
    outside that range.

- code: R0006
  name: string-slice-out-of-bounds
  category: runtime
  summary: "'.slice(start..end)' had a start or end outside the String's valid range."
  message: "'.slice({start}..{end})' is out of range for this String."
  explanation: >-
    '.slice(start..end)' counts characters from 0 and the end is exclusive, so
    a String with {length} character(s) only accepts a start and end between 0
    and {length}, with start no greater than end. '{start}' and '{end}' don't
    fit that rule here.

- code: R0007
  name: negative-repeat-count
  category: runtime
  summary: "'.repeat(n)' was called with a negative n."
  message: "'.repeat({count})' can't repeat a String a negative number of times."
  explanation: >-
    '.repeat(n)' builds a new String out of n copies of this one, so n has to
    be 0 or more — there's no such thing as repeating something a negative
    number of times. Use 0 if you want an empty String back.

- code: R0008
  name: abort
  category: runtime
  summary: "'abort' deliberately stopped the program at a point marked unreachable."
  message: "The program aborted: {reason}"
  explanation: >-
    'abort' stops the program on purpose, at a spot the code treats as impossible
    to reach — a branch ruled out earlier, or an invariant that has been broken.
    The reason above is the one written at that 'abort'. If this spot can really
    be reached, handle that case instead of aborting.

- code: R0009
  name: orabort-on-failure
  category: runtime
  summary: "'.orAbort()' was called on a Result that turned out to be a Failure."
  message: "'.orAbort()' stopped the program on a Failure: {error}{context}"
  explanation: >-
    '.orAbort()' hands back the value inside a Success, but this Result was a
    Failure, so there is no value to unwrap. It stops the program and reports the
    Failure's error rather than carry on with something missing. Handle the
    Failure with 'match' or 'try' if it can really happen, and keep '.orAbort()'
    only where a Failure would be a bug.

- code: R0010
  name: orabort-on-none
  category: runtime
  summary: "'.orAbort()' was called on an Optional that turned out to be None."
  message: "'.orAbort()' stopped the program: this value is None{context}"
  explanation: >-
    '.orAbort()' hands back the value inside an Optional when it is present, but
    this one was None, so there is nothing to unwrap. It asserts the value is
    there, so a None stops the program. Handle the None with 'match' or '??' if it
    can really happen, and keep '.orAbort()' only where a None would be a bug.

- code: R0011
  name: assertion-failed
  category: runtime
  summary: "'assert' was given a condition that turned out to be False."
  message: "An assertion failed: this condition was False."
  explanation: >-
    'assert(condition)' checks that something you expect to be true really is. This
    condition came out False at run time, so the program stops here rather than
    carry on past a broken expectation. Find why it wasn't true, or handle that
    case instead of asserting.

- code: R0012
  name: assert-equal-failed
  category: runtime
  summary: "'assertEqual' was given two values that turned out not to be equal."
  message: "An assertion failed: {left} is not equal to {right}."
  explanation: >-
    'assertEqual(a, b)' checks that two values are equal. Here they weren't — the
    first was {left} and the second {right} — so the program stops. This usually
    means a computation produced something other than what was expected.
