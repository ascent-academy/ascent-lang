# N — name & binding: a name/slot rule is broken

- code: N0001
  name: undefined-slot
  category: name
  summary: A name was used before it was created with 'fix' or 'mut'.
  message: "I can't find anything named '{found}'."
  explanation: >-
    In Ascent a name has to be created before it's used, with 'fix' (a value
    that never changes) or 'mut' (one you can update later). Check that
    '{found}' is spelled the same as where you created it, or create it before
    this line.

- code: N0002
  name: reassign-fix
  category: name
  summary: Assignment to a name created with 'fix', whose value never changes.
  message: "'{found}' was created with 'fix', so its value can't change."
  explanation: >-
    A name created with 'fix' keeps its first value for good — that's what
    'fix' means. If '{found}' needs to hold different values over time, create
    it with 'mut' instead of 'fix' where it was first made.
  related:
    - key: declaration
      label: "'{found}' was created with 'fix' here"

- code: N0003
  name: assign-to-undeclared
  category: name
  summary: Assignment to a name that was never created with 'fix' or 'mut'.
  message: "I can't find a name '{found}' to assign to."
  explanation: >-
    '=' changes the value of a name that already exists. To create '{found}'
    and give it a value at the same time, write 'mut {found} = …' (for a value
    you'll change later) or 'fix {found} = …' (for one that won't). If '{found}'
    should already exist, check the spelling.

- code: N0004
  name: assign-to-arg
  category: name
  summary: Assignment to a program input, which is fixed for the whole run.
  message: "'{found}' is a program input, so its value can't change."
  explanation: >-
    '{found}' comes from the program's 'args' — it's set once when the program
    starts and stays the same for the whole run, so it can't be assigned to. To
    work with a value you can update, make a new name with 'mut' and start it
    from '{found}', like 'mut total = {found};'.

- code: N0005
  name: unknown-type
  category: name
  summary: A type name was used that hasn't been declared.
  message: "I can't find a type named '{name}'."
  explanation: >-
    A type has to be declared with 'type' before it's used, like
    'type Person = { name: String }'. Check that '{name}' is spelled the same as
    where you declared it, and that its declaration comes before this line.

- code: N0006
  name: duplicate-type
  category: name
  summary: A type was declared with a name that's already a type.
  message: "There's already a type named '{found}'."
  explanation: >-
    Each type name is declared once. '{found}' is already the name of another
    type, so this second 'type {found} = …' would give the same name two
    meanings. Rename one of them.
  related:
    - key: declaration
      label: "'{found}' was already declared here"

- code: N0007
  name: duplicate-field
  category: name
  summary: A record type declares two fields with the same name.
  message: "This type already has a field named '{name}'."
  explanation: >-
    Each field of a record has its own name, and the names have to be different
    so every field can be told apart. '{name}' is listed twice here — remove or
    rename one of them.
  related:
    - key: declaration
      label: "'{name}' was already listed here"

- code: N0008
  name: redeclare-builtin-type
  category: name
  summary: A 'type' declaration reuses a built-in type name.
  message: "'{name}' is a built-in type, so it can't be redeclared."
  explanation: >-
    '{name}' already names one of the language's built-in types (Int, Float,
    Bool, String, List), so a 'type' declaration can't reuse it. Choose a
    different name for your type.
